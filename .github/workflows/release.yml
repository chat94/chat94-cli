name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            tool: cargo
          - target: x86_64-apple-darwin
            os: macos-14
            tool: cargo
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            tool: cross
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            tool: cross

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        # To embed Sentry telemetry in shipped binaries, add CHAT94_SENTRY_DSN
        # as a repository secret and pass it through here:
        #   env:
        #     CHAT94_SENTRY_DSN: ${{ secrets.CHAT94_SENTRY_DSN }}
        run: ${{ matrix.tool }} build --release --target ${{ matrix.target }} -p chat94

      - name: Package tarball
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="chat94-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" chat94
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha256 }}
