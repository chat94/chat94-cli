name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        # To embed Sentry telemetry in shipped binaries, add CHAT94_SENTRY_DSN
        # as a repository secret and pass it through here:
        #   env:
        #     CHAT94_SENTRY_DSN: ${{ secrets.CHAT94_SENTRY_DSN }}
        run: cargo build --release --target ${{ matrix.target }} -p chat94

      - name: Package tarball
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="chat94-${version}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" chat94
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.sha256 }}
